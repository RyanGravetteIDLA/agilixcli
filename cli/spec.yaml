name: agilix-buzz
description: "Agilix Buzz LMS CLI — full DLAP command surface plus offline activity analytics and content review."
version: "0.1.0"
cli_description: "The first maintained, agent-native CLI for Agilix Buzz — every DLAP command plus offline activity analytics, content review, and a local database no other Buzz tool has."
category: productivity
base_url: "https://api.agilixbuzz.com"
health_check_path: "/cmd?cmd=getstatus"
required_headers:
  - name: User-Agent
    value: "agilix-buzz-pp-cli/0.1 (+https://github.com/mvanhorn/printing-press-library)"
  - name: Accept
    value: "application/json"
auth:
  type: bearer_token
  header: "Authorization"
  format: "Bearer {token}"
  in: header
  env_vars:
    - BUZZ_TOKEN
config:
  format: toml
  path: "~/.config/agilix-buzz/config.toml"
mcp:
  transport: [stdio, http]
  orchestration: code
  endpoint_tools: hidden
resources:
  session:
    description: "Authentication & session (login, token, proxy/login-as)"
    endpoints:
      clear-second-factor-authentication:
        method: POST
        path: "/cmd?cmd=clearsecondfactorauthentication"
        description: "Clears 2FA (second factor authentication) settings for the specified user account, allowing the user to login without 2FA (the user will hav"
        params:
          - name: userid
            type: string
            required: false
      create-second-factor-authentication-secret:
        method: GET
        path: "/cmd?cmd=createsecondfactorauthenticationsecret"
        description: "This command creates an RFC 6238 second factor authentication secret for use with 2FA authentication."
        params:
          - name: encryption
            type: string
            required: false
      extend-session:
        method: POST
        path: "/cmd?cmd=extendsession"
        description: "Each API command automatically refreshes the authorization token, extending the expiration for the duration originally specified at login, b"
      finish-password-reset:
        method: POST
        path: "/cmd?cmd=finishpasswordreset"
        description: "This command updates the password of the specified user."
        params:
          - name: token
            type: string
            required: false
          - name: password
            type: string
            required: false
      force-password-change:
        method: POST
        path: "/cmd?cmd=forcepasswordchange"
        description: "Forces a user to change their password the next time they login, exactly as if their password had expired."
        params:
          - name: userid
            type: string
            required: false
      get-key:
        method: GET
        path: "/cmd?cmd=getkey"
        description: "This command retrieves a name/value pair from an entity."
        params:
          - name: entityid
            type: string
            required: false
          - name: name
            type: string
            required: false
      get-password-login-attempt-history:
        method: GET
        path: "/cmd?cmd=getpasswordloginattempthistory"
        description: "Gets the record of password login attempts for the specified user account."
        params:
          - name: userid
            type: string
            required: false
          - name: earliestrecordtoreturn
            type: string
            required: false
      get-password-question:
        method: GET
        path: "/cmd?cmd=getpasswordquestion"
        description: "This command gets the question to ask a user who has forgotten their password."
        params:
          - name: username
            type: string
            required: false
      login:
        method: POST
        path: "/cmd?cmd=login3"
        description: "For server-side API integrations, OAuth 2.0 Application Identity is now available as an alternative authentication mechanism."
        params:
          - name: username
            type: string
            required: false
          - name: password
            type: string
            required: false
          - name: expireseconds
            type: string
            required: false
          - name: newsession
            type: string
            required: false
          - name: token
            type: string
            required: false
          - name: remembermfa
            type: string
            required: false
      logout:
        method: POST
        path: "/cmd?cmd=logout"
        description: "This command terminates the session state for an authenticated user."
        params:
          - name: reusable
            type: string
            required: false
          - name: clearallbrowserdata
            type: string
            required: false
      proxy:
        method: POST
        path: "/cmd?cmd=proxy"
        description: "This command starts a session as a different user."
        params:
          - name: userid
            type: string
            required: false
          - name: noazt
            type: string
            required: false
      put-key:
        method: GET
        path: "/cmd?cmd=putkey"
        description: "This command stores a name/value pair on an entity."
        params:
          - name: entityid
            type: string
            required: false
          - name: name
            type: string
            required: false
          - name: value
            type: string
            required: false
      reset-lockout:
        method: POST
        path: "/cmd?cmd=resetlockout"
        description: "This command resets an account that has been locked out due to too many contiguous password failures."
        params:
          - name: userid
            type: string
            required: false
      reset-password:
        method: POST
        path: "/cmd?cmd=resetpassword"
        description: "This command sends an email to the specified user with a time-limited link that can be used to reset their password."
        params:
          - name: username
            type: string
            required: false
          - name: firstname
            type: string
            required: false
          - name: lastname
            type: string
            required: false
          - name: answer
            type: string
            required: false
      second-factor-authenticate:
        method: POST
        path: "/cmd?cmd=secondfactorauthenticate"
        description: "This command completes the two factor part of authentication for users who have opted for two factor authentication."
        params:
          - name: otp
            type: string
            required: false
          - name: rememberdevice
            type: string
            required: false
      setup-second-factor-authentication:
        method: POST
        path: "/cmd?cmd=setupsecondfactorauthentication"
        description: "Turns on second factor authentication for an account."
        params:
          - name: delivery
            type: string
            required: false
          - name: encryption
            type: string
            required: false
          - name: secret
            type: string
            required: false
          - name: otp1
            type: string
            required: false
          - name: otp2
            type: string
            required: false
      unproxy:
        method: POST
        path: "/cmd?cmd=unproxy"
        description: "This command ends a proxy session."
        params:
          - name: noazt
            type: string
            required: false
      update-password:
        method: POST
        path: "/cmd?cmd=updatepassword"
        description: "This command updates the password of the specified user."
        params:
          - name: userid
            type: string
            required: false
          - name: token
            type: string
            required: false
          - name: password
            type: string
            required: false
          - name: oldpassword
            type: string
            required: false
      update-password-question-answer:
        method: POST
        path: "/cmd?cmd=updatepasswordquestionanswer"
        description: "This command updates the password question and answer for the specified user."
        params:
          - name: userid
            type: string
            required: false
          - name: passwordquestion
            type: string
            required: false
          - name: passwordanswer
            type: string
            required: false
          - name: oldpassword
            type: string
            required: false
  system:
    description: "Server status & general utilities"
    endpoints:
      get-command-list:
        method: GET
        path: "/cmd?cmd=getcommandlist"
        description: "This returns a complete list of all commands available on the API Server."
      get-entity-type:
        method: GET
        path: "/cmd?cmd=getentitytype"
        description: "This command gets the entity type (Course, Domain, Group, or Section) for a given entity ID."
        params:
          - name: entityid
            type: string
            required: false
      get-status:
        method: GET
        path: "/cmd?cmd=getstatus"
        description: "The API servers do fairly extensive self-testing for all subsystems."
        params:
          - name: rating
            type: string
            required: false
          - name: sms
            type: bool
            required: false
          - name: html
            type: bool
            required: false
      send-mail:
        method: POST
        path: "/cmd?cmd=sendmail"
        description: "This command sends an e-mail to recipients that are enrolled in the same entity as that specified by the sender's enrollmentid ."
        params:
          - name: enrollmentid
            type: string
            required: false
  domains:
    description: "Domains (schools/districts) & hierarchy"
    endpoints:
      create:
        method: POST
        path: "/cmd?cmd=createdomains"
        description: "This command creates one or more domains and links them as children to the domain specified by parentid."
        params:
          - name: name
            type: string
            required: false
          - name: userspace
            type: string
            required: false
          - name: parentid
            type: string
            required: false
          - name: reference
            type: string
            required: false
          - name: flags
            type: string
            required: false
      get-settings:
        method: GET
        path: "/cmd?cmd=getdomainsettings"
        description: "Retrieve domain-hierarchy-merged application settings (no auth required)."
        params:
          - name: domainid
            type: string
            required: false
          - name: path
            type: string
            required: false
          - name: includesource
            type: bool
            required: false
      get:
        method: GET
        path: "/cmd?cmd=getdomain2"
        description: "This command gets information for the specified domain."
        params:
          - name: domainid
            type: string
            required: false
          - name: select
            type: string
            required: false
      get-content:
        method: GET
        path: "/cmd?cmd=getdomaincontent"
        description: "This command returns the list of content items for the current signed-on user’s domain."
      get-enrollment-metrics:
        method: GET
        path: "/cmd?cmd=getdomainenrollmentmetrics"
        description: "This command gets enrollment metrics for courses in the specified domain."
        params:
          - name: domainid
            type: string
            required: false
          - name: skipempty
            type: string
            required: false
      get-enrollment-metrics-parameters:
        method: GET
        path: "/cmd?cmd=getdomainenrollmentmetricsparameters"
        description: "This command gets parameters that affect calculations used in Enrollment Metrics , Course EnrollmentMetrics , and GetDomainEnrollmentMetrics"
        params:
          - name: domainid
            type: string
            required: false
      get-parent-list:
        method: GET
        path: "/cmd?cmd=getdomainparentlist"
        description: "This command gets the list of parent domains for a domain."
        params:
          - name: domainid
            type: string
            required: false
          - name: path
            type: string
            required: false
          - name: includesource
            type: string
            required: false
      get-stats:
        method: GET
        path: "/cmd?cmd=getdomainstats"
        description: "This command gets statistics for a domain."
        params:
          - name: domainid
            type: string
            required: false
          - name: options
            type: string
            required: false
          - name: recurse
            type: string
            required: false
      list:
        method: GET
        path: "/cmd?cmd=listdomains"
        description: "This command lists domains."
        params:
          - name: domainid
            type: string
            required: false
          - name: includedescendantdomains
            type: bool
            required: false
          - name: limit
            type: int
            required: false
          - name: show
            type: string
            required: false
          - name: select
            type: string
            required: false
          - name: text
            type: string
            required: false
          - name: query
            type: string
            required: false
          - name: includemanageddomains
            type: string
            required: false
      restore:
        method: GET
        path: "/cmd?cmd=restoredomain"
        description: "This command restores a deleted domain."
        params:
          - name: domainid
            type: string
            required: false
      update:
        method: POST
        path: "/cmd?cmd=updatedomains"
        description: "This command updates the name, reference value, flags, and free-forn structured data of one or more domains."
        params:
          - name: domainid
            type: string
            required: false
          - name: name
            type: string
            required: false
          - name: parentid
            type: string
            required: false
          - name: reference
            type: string
            required: false
          - name: flags
            type: string
            required: false
