# agentcookie.toml: secrets-bus adoption manifest v2
# See docs/spec-agentcookie-secrets-bus-v2-adoption.md
schema_version = 2
name = "agilix-buzz-pp-cli"
display_name = "Agilix Buzz"
description = "The first maintained, agent-native CLI for Agilix Buzz — every DLAP command plus offline activity analytics, content review, and a local database no other Buzz tool has."
project_kind = "cli"

[secrets.file]
path = "~/.config/agilix-buzz-pp-cli/config.toml"

[sync]
default = false

[sync.keys]
BUZZ_TOKEN = true
