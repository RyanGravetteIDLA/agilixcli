version: 2
project_name: agilix-buzz-pp-cli
changelog:
  disable: true
builds:
  - id: agilix-buzz-pp-cli
    main: ./cmd/agilix-buzz-pp-cli
    binary: agilix-buzz-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X agilix-buzz-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: agilix-buzz-pp-mcp
    main: ./cmd/agilix-buzz-pp-mcp
    binary: agilix-buzz-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: agilix-buzz-pp-cli
    repository:
      owner: ryangravetteidla
      name: homebrew-tap
    homepage: "https://github.com/ryangravetteidla/agilix-buzz-pp-cli"
    description: "The first maintained, agent-native CLI for Agilix Buzz — every DLAP command plus offline activity analytics, content review, and a local database no other Buzz tool has."
    install: |
      bin.install "agilix-buzz-pp-cli"
      bin.install "agilix-buzz-pp-mcp"
